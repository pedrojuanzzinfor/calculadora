<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Simples</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="calculator">
        <form action="calculator.php" method="post">
            <div class="display">
                <input type="text" name="expression" id="display" readonly>
            </div>
            <div class="buttons">
                <button type="button" class="btn clear">C</button>
                <button type="button" class="btn operation">/</button>
                <button type="button" class="btn operation">*</button>
                <button type="button" class="btn operation">-</button>
                <button type="button" class="btn number">7</button>
                <button type="button" class="btn number">8</button>
                <button type="button" class="btn number">9</button>
                <button type="button" class="btn operation">+</button>
                <button type="button" class="btn number">4</button>
                <button type="button" class="btn number">5</button>
                <button type="button" class="btn number">6</button>
                <button type="button" class="btn equals">=</button>
                <button type="button" class="btn number">1</button>

                <button type="button" class="btn number">2</button>
                <button type="button" class="btn number">3</button>
                <button type="button" class="btn zero number">0</button>
                <button type="button" class="btn number">.</button>
            </div>
            <input type="hidden" name="num1" id="num1">
            <input type="hidden" name="operation" id="operation">
            <input type="hidden" name="num2" id="num2">
            <input type="hidden" name="operation2" id="operation2">
            <input type="hidden" name="num3" id="num3">
        </form>
    </div>
        <script src="script.js"></script>
</body>
</html>
